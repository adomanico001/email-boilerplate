<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>

    </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Prevent iOS Mail from auto-scaling -->
    <meta name="x-apple-disable-message-reformatting">
    <!--[if mso]>
            <style>
                * { font-family: Arial, sans-serif !important; }
            </style>
        <![endif]-->
    <style>
        /* Base resets that survive inliners */
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        img {
            border: 0;
            display: block;
            line-height: 100%;
        }

        table {
            border-collapse: collapse;
        }

        a {
            text-decoration: none;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            .bg {
                background: #111111 !important;
            }

            .card {
                background: #1b1b1b !important;
            }

            .text {
                color: #e8e8e8 !important;
            }

            .muted {
                color: #aaaaaa !important;
            }

            .btn {
                color: #ffffff !important;
            }
        }

        /* Mobile */
        @media only screen and (max-width:600px) {
            .container {
                width: 100% !important;
            }

            .p-sm {
                padding-left: 16px !important;
                padding-right: 16px !important;
            }

            .stack {
                display: block !important;
                width: 100% !important;
            }

            .hero-img {
                width: 100% !important;
                height: auto !important;
            }

            .btn {
                display: block !important;
                width: 100% !important;
            }
        }
    </style>
</head>

<body class="bg" style="margin: 0; padding: 0; background: #f5f7fa;">
    <!-- Preheader (hidden) -->
    <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">
        Preheader text goes here - boost open rates.
    </div>

    <!-- View in browser -->
    <table role="presentation" width="100%" style="background: #f5f7fa;">
        <tr>
            <td align="center" style="padding: 10px 0;">
                <span class="muted" style="font-size: 12px; color: #7a8594;">
                    Trouble viewing? <a href="https://example.com/view"
                        style="color: #7a8594; text-decoration: underline;">
                        View in browser
                    </a>
                </span>
            </td>
        </tr>
    </table>

    <!-- Outer wrapper -->
    <table role="presentation" width="100%" style="background: #f5f7fa;">
        <tr>
            <td align="center">
                <!-- 600px container -->
                <table role="presentation" width="600" class="container" style="width: 600px; background: #ffffff;"
                    bgcolor="#ffffff">
                    <!-- Header -->
                    <tr>
                        <td align="left" class="p-sm" style="padding: 20px 24px; background: #ffffff;">
                            <a href="https://example.com" target="_blank">
                                <img src="https://via.placeholder.com/120x36?text=Launchkit" width="120" height="36"
                                    alt="Launchkit" style="display:block;">
                            </a>
                        </td>
                    </tr>

                    <!-- Hero image -->
                    <tr>
                        <td>
                            <img class="hero-img" src="https://via.placeholder.com/1200x600" width="600"
                                alt="Hero image alt text" style="width:600px; height:auto;">
                        </td>
                    </tr>

                    <!-- Card body -->
                    <tr>
                        <td class="p-sm" style="padding: 28px 32px; background: #ffffff;">
                            <table role="presentation" width="100%">
                                <tr>
                                    <td class="text"
                                        style="font-family: Arial, sans-serif; color: #1f2a37; font-size: 22px; line-height: 30px; font-weight: bold;">
                                        Headline goes here
                                    </td>
                                </tr>
                                <tr>
                                    <td height="12" style="font-size:0; line-height:12;">&nbsp;</td>
                                </tr>
                                <tr>
                                    <td class="text"
                                        style="font-family: Arial, sans-serif; color: #415166; font-size: 15px; line-height: 24px;">
                                        Keep copy under 70 characters
                                    </td>
                                </tr>
                                <tr>
                                    <td height="20" style="font-size:0; line-height:20;">&nbsp;</td>
                                </tr>

                                <!-- Bulletproof button -->
                                <tr>
                                    <td align="left">
                                        <!--[if mso]>
                                            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" href="https://example.com/cta" style="height:44px; v-text-anchor:middle; width:200px;" arcsize="12%" stroke="f" fillcolor="#2563eb">
                                                <w:anchorlock/>
                                                <center style="color:#ffffff; font-family:Arial, sans-serif; font-size:16px; font-weight:bold;">
                                                    Call to Action
                                                </center>
                                            </v:roundrect>
                                        <![endif]-->
                                        <!--[if !mso]><!-->
                                        <a class="btn" href="https://example.com/cta"
                                            style="display:inline-block; background:#2563eb; color:#ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; line-height: 44px; text-align: center; border-radius: 6px; padding: 0 24px;">
                                            Call to Action
                                        </a>
                                        <!--<![endif]-->
                                    </td>
                                </tr>

                                <tr>
                                    <td height="28" style="font-size:0; line-height:28;">&nbsp;</td>
                                </tr>

                                <!-- Secondary content block -->
                                <tr>
                                    <td class="card text"
                                        style="background: #f8fafc; border-radius: 8px; padding: 16px 18px; font-family: Arial, sans-serif; color: #334155;">
                                        
                                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border"0">
                                            <tr>
                                                <td style="font-size:16px; line-height:22px; font-weight:bold; padding-bottom:8px;">
                                                    Placeholder
                                                </td>
                                            </tr>
                                            
                                            <tr>
                                                <td style="padding-bottom:6px;">
                                                    <table role="presentation" cellpadding="0" cellspacing="0" border"0">
                                        
                                        <!-- <strong
                                            style="display: block; font-size: 16px; margin-bottom: 6px;">Placeholder</strong>
                                        <ul style="margin:0; padding-left: 18px;">
                                            <li style="margin-bottom: 6px;">Feature 1</li>
                                            <li style="margin-bottom: 6px;">Feature 2</li>
                                            <li style="margin-bottom: 0;">Feature 3</li>
                                        </ul> -->
                                    </td>
                                </tr>

                            </table>
                        </td>
                    </tr>

                    <!-- Divider -->
                    <tr>
                        <td style="padding: 0 32px;">
                            <table role="presentation" width="100%">
                                <tr>
                                    <td
                                        style="border-top: 1px solid #e5e7eb; height: 1px; line-height: 1px; font-size: 0;">
                                        &nbsp;</td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td class="p-sm" align="left" style="padding: 20px 32px; background: #ffffff;">
                            <table role="presentation" width="100%">
                                <tr>
                                    <td class="muted"
                                        style="font-family: Arial, sans-serif; font-size: 12px; line-height: 18px; color: #6b7280;">
                                        You are receiving this because you opted in at our website.
                                        <br> 123 Main Street, Atlanta, GA 30301
                                    </td>
                                </tr>
                                <tr>
                                    <td height="8" style="font-size: 0; line-height: 8;">&nbsp;</td>
                                </tr>
                                <tr>
                                    <td class="muted"
                                        style="font-family: Arial, sans-serif; font-size: 12px; line-height: 18px; color: #6b7280;">
                                        <a href="https://example.com/preferences"
                                            style="color: #6b7280; text-decoration: underline;">Manage preferences</a>
                                        |
                                        <a href="https://example.com/unsubscribe"
                                            style="color: #6b7280; text-decoration: underline;">Unsubscribe</a>
                                    </td>
                                </tr>
                                <tr>
                                    <td height="16" style="font-size: 0; line-height: 16;">&nbsp;</td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>

</body>

</html>
